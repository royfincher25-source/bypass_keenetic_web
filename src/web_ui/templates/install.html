{% extends "base.html" %}

{% block title %}Установка — Bypass Keenetic{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-download"></i> Установка и удаление</h2>
    <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Назад
    </a>
</div>

<div class="row g-4">
    <div class="col-12 col-md-6">
        <div class="card shadow-sm border-success">
            <div class="card-body text-center">
                <i class="bi bi-download display-4 text-success"></i>
                <h5 class="card-title mt-3">Установка</h5>
                <p class="card-text text-muted">Установить компоненты</p>
                <button class="btn btn-success btn-lg">
                    <i class="bi bi-play"></i> Установить
                </button>
            </div>
        </div>
    </div>

    <div class="col-12 col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center">
                <i class="bi bi-trash display-4 text-danger"></i>
                <h5 class="card-title mt-3">Удаление</h5>
                <p class="card-text text-muted">Удалить компоненты</p>
                <button class="btn btn-danger btn-lg">
                    <i class="bi bi-x-lg"></i> Удалить
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
